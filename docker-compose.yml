services:
  # --- GATEWAY ---
  gateway:
    build:
      context: ./services/gateway-laravel
      dockerfile: Dockerfile
    container_name: gateway-laravel
    volumes:
      - ./services/gateway-laravel:/var/www
      - /var/www/vendor
    ports:
      - "8000:8000"
    depends_on:
      gateway-db:
        condition: service_healthy
    command: >
      sh -c "sleep 10 && 
             php artisan key:generate --force && 
             php artisan migrate --force && 
             php artisan serve --host=0.0.0.0 --port=8000 --no-reload"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  gateway-db:
    image: mysql:8.0
    container_name: mysql_gateway
    environment:
      - MYSQL_DATABASE=project_gateway
      - MYSQL_ROOT_PASSWORD=root
    volumes:
      - db_gateway_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- CATALOG ---
  catalog-inventory:
    build: ./services/catalog-inventory-flask
    container_name: catalog-inventory-flask
    volumes:
      - ./services/catalog-inventory-flask:/app
    ports:
      - "5001:5001"
    depends_on:
      catalog-db:
        condition: service_healthy
    command: sh -c "sleep 10 && flask db upgrade && flask --app app.py run --host=0.0.0.0 --port=5001"

  catalog-db:
    image: mysql:8.0
    container_name: mysql_catalog
    environment:
      - MYSQL_DATABASE=project_catalog_inventory
      - MYSQL_ROOT_PASSWORD=root
    volumes:
      - db_catalog_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- SALES ---
  orders-sales:
    build: ./services/orders-sales-express
    container_name: orders-sales-express
    volumes:
      - ./services/orders-sales-express:/app
      - node_modules_sales:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      sales-db:
        condition: service_healthy
    command: sh -c "sleep 10 && npm install && node index.js"

  sales-db:
    image: mongo:8
    container_name: mongodb_sales
    volumes:
      - db_sales_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- RECOMMENDATIONS ---
  recommendations:
    build: ./services/recommendations-django
    container_name: recommendations-django
    volumes:
      - ./services/recommendations-django:/app
    ports:
      - "8001:8001"
    depends_on:
      recommendations-db:
        condition: service_healthy
    command: sh -c "sleep 10 && python manage.py migrate && python manage.py runserver 0.0.0.0:8001"

  recommendations-db:
    image: postgres:16
    container_name: postgres_recommendations
    environment:
      - POSTGRES_DB=project_recommend
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - db_recommendations_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- REPORTS ---
  reports:
    build: ./services/reports-django
    container_name: reports-django
    volumes:
      - ./services/reports-django:/app
    ports:
      - "8002:8002"
    depends_on:
      reports-db:
        condition: service_healthy
    command: sh -c "sleep 10 && python manage.py migrate && python manage.py runserver 0.0.0.0:8002"

  reports-db:
    image: mysql:8.0
    container_name: mysql_reports
    environment:
      - MYSQL_DATABASE=project_reports
      - MYSQL_ROOT_PASSWORD=root
    volumes:
      - db_reports_data:/var/lib/mysql
    ports:
      - "3308:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- COVERAGE ---
  coverage:
    build: ./services/coverage-flask
    container_name: coverage-flask
    volumes:
      - ./services/coverage-flask:/app
    ports:
      - "5002:5002"
    depends_on:
      coverage-db:
        condition: service_healthy
    command: sh -c "sleep 10 && flask db upgrade && flask --app app.py run --host=0.0.0.0 --port=5002"

  coverage-db:
    image: mysql:8.0
    container_name: mysql_coverage
    environment:
      - MYSQL_DATABASE=project_stores
      - MYSQL_ROOT_PASSWORD=root
    volumes:
      - db_coverage_data:/var/lib/mysql
    ports:
      - "3309:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- TESTING (LOCUST) ---
  locust-testing:
    build:
      context: ./testing
      dockerfile: Dockerfile
    container_name: locust-testing
    volumes:
      - ./testing:/app
    ports:
      - "8089:8089"
    command: sleep infinity

volumes:
  db_gateway_data:
  db_catalog_data:
  db_sales_data:
  node_modules_sales:
  db_recommendations_data:
  db_reports_data:
  db_coverage_data: